<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Target Timer Puzzle</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #ui { position: absolute; top: 20px; text-align: center; }
        canvas { border: 2px solid #38bdf8; cursor: crosshair; }
    </style>
</head>
<body>

<div id="ui">
    <h1 id="msg">TARGET TIMER PUZZLE</h1>
    <p>Score: <span id="score">0</span></p>
    <button onclick="startGame()" id="startBtn" style="padding:15px 30px; font-size:18px;">START GAME</button>
</div>
<canvas id="gameCanvas"></canvas>

<script>
    // --- SDK INTEGRATION POINT ---
    // Yahan apna CrazyGames SDK script tag copy-paste karein jab aapko mil jaye
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 500; canvas.height = 300;
    
    let score = 0, particles = [];

    function startGame() {
        document.getElementById('startBtn').style.display = 'none';
        gameLoop();
    }

    canvas.onclick = (e) => {
        score += 10;
        document.getElementById('score').innerText = score;
        createParticles(e.clientX, e.clientY);
        // Play sound
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audio.createOscillator();
        osc.connect(audio.destination);
        osc.frequency.value = 440;
        osc.start(); osc.stop(0.1);
    };

    function createParticles(x, y) {
        for(let i=0; i<10; i++) particles.push({x, y, dx: (Math.random()-0.5)*10, dy: (Math.random()-0.5)*10, alpha: 1});
    }

    function gameLoop() {
        ctx.fillStyle = "rgba(0,0,0,0.2)";
        ctx.fillRect(0,0,500,300);
        
        // Draw Target
        ctx.fillStyle = "#ef4444";
        ctx.beginPath(); ctx.arc(250, 150, 40, 0, Math.PI*2); ctx.fill();

        // Particles
        particles.forEach((p, index) => {
            p.x += p.dx; p.y += p.dy; p.alpha -= 0.02;
            ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
            ctx.fillRect(p.x, p.y, 5, 5);
            if(p.alpha <= 0) particles.splice(index, 1);
        });
        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
