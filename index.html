<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #gameCanvas { background: #1e293b; border: 4px solid #38bdf8; border-radius: 10px; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Responsive Scaling
        function resize() {
            canvas.width = Math.min(window.innerWidth * 0.9, 600);
            canvas.height = canvas.width * 0.8;
        }
        window.onresize = resize;
        resize();

        // Particles System (Professional Touch)
        let particles = [];
        class Particle {
            constructor(x, y) { this.x=x; this.y=y; this.size=Math.random()*5; this.vx=Math.random()*4-2; this.vy=Math.random()*4-2; this.life=1; }
            update() { this.x+=this.vx; this.y+=this.vy; this.life-=0.02; }
            draw() { ctx.fillStyle = '#38bdf8'; ctx.globalAlpha=this.life; ctx.fillRect(this.x, this.y, this.size, this.size); }
        }

        canvas.addEventListener('mousedown', (e) => {
            for(let i=0; i<10; i++) particles.push(new Particle(e.offsetX, e.offsetY));
        });

        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.update(); p.draw();
                if(p.life <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
