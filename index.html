<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Target Timer Puzzle</title>
    <style>
        body { margin: 0; background: #0f172a; color: white; text-align: center; font-family: sans-serif; }
        #game-box { display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        canvas { background: #000; border: 4px solid #38bdf8; border-radius: 10px; display: none; }
        .btn { padding: 20px 40px; background: #38bdf8; border: none; border-radius: 10px; cursor: pointer; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-box">
    <h1>TARGET TIMER PUZZLE</h1>
    <button id="start-btn" class="btn" onclick="startNewGame()">START NEW GAME</button>
    <canvas id="gameCanvas" width="500" height="300"></canvas>
    <p id="score-board">Score: 0</p>
</div>

<script>
    let score = 0;
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function startNewGame() {
        document.getElementById('start-btn').style.display = 'none';
        canvas.style.display = 'block';
        gameLoop();
    }

    canvas.onclick = (e) => {
        score += 10;
        document.getElementById('score-board').innerText = "Score: " + score;
        // Yahan aap pop effect daal sakte hain
    };

    function gameLoop() {
        ctx.clearRect(0, 0, 500, 300);
        ctx.fillStyle = "#ff3e3e";
        ctx.beginPath();
        ctx.arc(250, 150, 50, 0, Math.PI * 2);
        ctx.fill();
        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
