<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Blaster Pro</title>
    <style>
        body { margin: 0; background: #0b0e14; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        #game-wrapper { width: 500px; height: 700px; background: #1a1f2e; border: 4px solid #38bdf8; border-radius: 20px; position: relative; overflow: hidden; }
        .hud { display: flex; justify-content: space-between; padding: 15px; font-weight: bold; color: #38bdf8; font-size: 20px; }
        canvas { display: block; cursor: crosshair; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="hud">
        <span>SCORE: <span id="score">0</span></span>
        <span>TIME: <span id="timer">120</span>s</span>
    </div>
    <canvas id="gameCanvas" width="500" height="600"></canvas>
    
    <div id="ui-layer">
        <h1 id="status-text">BUBBLE BLASTER</h1>
        <button id="start-btn" onclick="startGame()" style="padding: 15px 30px; font-size: 20px;">START MISSION</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let score = 0, timeLeft = 120, gameRunning = false, bubbles = [];
    const colors = ['#FF5733', '#33FF57', '#3357FF', '#FF33A1', '#F3FF33'];

    class Bubble {
        constructor() {
            this.r = 25;
            this.x = Math.random() * (canvas.width - 50) + 25;
            this.y = -50;
            this.vy = 2 + (score/100); 
            this.color = colors[Math.floor(Math.random() * colors.length)];
        }
        update() { this.y += this.vy; }
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill();
        }
    }

    function startGame() {
        document.getElementById('ui-layer').style.display = 'none';
        gameRunning = true;
        animate();
    }

    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        
        bubbles.forEach((b, i) => {
            const dist = Math.hypot(b.x - mouseX, b.y - mouseY);
            if (dist < b.r) {
                bubbles.splice(i, 1);
                score += 10;
                document.getElementById('score').innerText = score;
            }
        });
    });

    function animate() {
        if(!gameRunning) return;
        ctx.clearRect(0,0, canvas.width, canvas.height);
        
        if(Math.random() < 0.03) bubbles.push(new Bubble());
        
        bubbles.forEach((b, i) => {
            b.update(); b.draw();
            if(b.y > canvas.height) bubbles.splice(i, 1);
        });
        requestAnimationFrame(animate);
    }

    setInterval(() => {
        if(gameRunning && timeLeft > 0) {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
        }
    }, 1000);
</script>
</body>
</html>
