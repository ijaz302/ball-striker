<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Blaster Pro</title>
    <style>
        body { margin: 0; background: #0b0e14; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-wrapper { position: relative; width: 600px; height: 750px; background: #1a1f2e; border-radius: 20px; border: 4px solid #38bdf8; box-shadow: 0 0 50px rgba(56, 189, 248, 0.3); text-align: center; }
        #loading-screen, #menu-screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #1a1f2e; z-index: 10; }
        canvas { background: #050505; border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; }
        .btn { padding: 15px 40px; font-size: 20px; background: #f43f5e; color: white; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .hud { display: flex; justify-content: space-between; padding: 15px; font-weight: bold; color: #38bdf8; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="loading-screen"><h2>LOADING MISSION...</h2></div>
    <div id="menu-screen" style="display:none;">
        <h1>BUBBLE BLASTER</h1>
        <button class="btn" onclick="startGame()">START GAME</button>
    </div>

    <div class="hud">
        <span>SCORE: <span id="score">0</span></span>
        <span>LEVEL: <span id="level">1</span>/50</span>
    </div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let score = 0, level = 1;
    const colors = ['#f87171', '#fbbf24', '#34d399', '#38bdf8', '#c084fc'];
    let bubbles = [];

    // Bubble Class (Falling Physics)
    class Bubble {
        constructor() {
            this.radius = 25;
            this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
            this.y = -50; // Upar se girna
            this.speed = 2 + (level * 0.5);
            this.color = colors[Math.floor(Math.random() * colors.length)];
            this.timer = 5;
        }
        update() {
            this.y += this.speed;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "white";
            ctx.fillText(this.timer, this.x, this.y);
        }
    }

    function startGame() {
        document.getElementById('menu-screen').style.display = 'none';
        setInterval(() => bubbles.push(new Bubble()), 1000);
        animate();
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        bubbles.forEach((b, index) => {
            b.update();
            b.draw();
            if(b.y > canvas.height) bubbles.splice(index, 1);
        });
        requestAnimationFrame(animate);
    }

    // Loading Simulation
    setTimeout(() => {
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('menu-screen').style.display = 'flex';
    }, 2000);
</script>
</body>
</html>
