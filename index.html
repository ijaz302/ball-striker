<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Blaster Pro</title>
    <style>
        body { background: #0b0e14; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        canvas { background: #050505; border: 4px solid #38bdf8; border-radius: 15px; cursor: crosshair; }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="500" height="600"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const cols = 8, rows = 10;
    const size = 25; // Ball ka size bada kar diya
    let grid = [];
    const colors = ['#FF5733', '#33FF57', '#3357FF', '#FF33A1', '#F3FF33'];

    function init() {
        for(let r=0; r<rows; r++) {
            grid[r] = [];
            for(let c=0; c<cols; c++) {
                grid[r][c] = { color: colors[Math.floor(Math.random()*colors.length)], active: true };
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for(let r=0; r<rows; r++) {
            for(let c=0; c<cols; c++) {
                if(grid[r][c].active) {
                    ctx.fillStyle = grid[r][c].color;
                    ctx.beginPath();
                    ctx.arc(c * 60 + 40, r * 55 + 40, size, 0, Math.PI*2);
                    ctx.fill();
                }
            }
        }
    }

    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left - 20) / 60);
        const y = Math.floor((e.clientY - rect.top - 20) / 55);

        if(y >= 0 && y < rows && x >= 0 && x < cols && grid[y][x].active) {
            let color = grid[y][x].color;
            // Match-3 check: simple horizontal match for now
            if(x > 0 && x < cols-1 && grid[y][x-1].color === color && grid[y][x+1].color === color) {
                grid[y][x].active = grid[y][x-1].active = grid[y][x+1].active = false;
                applyGravity();
            }
        }
        draw();
    });

    function applyGravity() {
        for(let c=0; c<cols; c++) {
            for(let r=rows-1; r>0; r--) {
                if(!grid[r][c].active) {
                    grid[r][c] = grid[r-1][c];
                    grid[r-1][c] = { active: false };
                }
            }
        }
    }

    init();
    draw();
</script>
</body>
</html>
