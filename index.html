<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Timer Puzzle</title>
    <style>
        body { background: #090d16; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .game-container { background: #111827; border: 2px solid #38bdf8; border-radius: 20px; padding: 20px; width: 95%; max-width: 550px; text-align: center; }
        canvas { background: #030712; width: 100%; height: auto; border: 2px solid #0284c7; border-radius: 10px; cursor: pointer; }
        #quiz-box { display: none; margin-top: 20px; padding: 20px; background: #1e293b; border-radius: 10px; }
        .btn-arcade { background: linear-gradient(180deg, #38bdf8 0%, #0284c7 100%); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="game-container">
    <h3>TARGET TIMER PUZZLE</h3>
    <div id="game-ui">
        <div>SCORE: <span id="score">0</span> | TIME: <span id="time">10</span>s</div>
        <canvas id="gameCanvas" width="540" height="300"></canvas>
    </div>

    <!-- Quiz Section -->
    <div id="quiz-box">
        <p id="question">Sawaal yahan aayega?</p>
        <button class="btn-arcade" onclick="checkAnswer(true)">TRUE</button>
        <button class="btn-arcade" onclick="checkAnswer(false)">FALSE</button>
    </div>
</div>

<script>
    let score = 0, timeLeft = 10, gameActive = true;
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Quiz Data
    const quiz = { q: "Is 2+2=4?", a: true };

    function checkAnswer(ans) {
        if (ans === quiz.a) { alert("Correct!"); score += 50; }
        else { alert("Wrong!"); }
        location.reload(); // Game restart
    }

    canvas.addEventListener('click', () => {
        if(gameActive) { score += 10; document.getElementById('score').innerText = score; }
    });

    const timer = setInterval(() => {
        if (timeLeft > 0) {
            timeLeft--;
            document.getElementById('time').innerText = timeLeft;
        } else {
            gameActive = false;
            clearInterval(timer);
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('quiz-box').style.display = 'block';
            document.getElementById('question').innerText = quiz.q;
        }
    }, 1000);

    // Simple Drawing
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#f43f5e";
        ctx.beginPath(); ctx.arc(270, 150, 30, 0, Math.PI*2); ctx.fill();
        if(gameActive) requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
