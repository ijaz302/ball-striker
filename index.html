<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Blaster Pro</title>
    <style>
        body { margin: 0; background: #0b0e14; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { width: 400px; background: #1a1f2e; border: 4px solid #38bdf8; border-radius: 20px; padding: 20px; }
        canvas { background: #050505; border-radius: 10px; cursor: crosshair; display: block; margin: 0 auto; }
    </style>
</head>
<body>

<div id="game-container">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px; color:#38bdf8; font-weight:bold;">
        <span>SCORE: <span id="score">0</span></span>
        <span>LEVEL: 1</span>
    </div>
    <canvas id="gameCanvas" width="360" height="500"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    
    let score = 0;
    const colors = ['#FF5733', '#33FF57', '#3357FF', '#FF33A1', '#F3FF33'];
    let bubbles = [];

    // Grid Generation Logic
    function initGame() {
        bubbles = [];
        for (let row = 0; row < 5; row++) {
            for (let col = 0; col < 6; col++) {
                // Logic: 10% chance for Bomb
                let isBomb = Math.random() < 0.1; 
                bubbles.push({
                    x: col * 60 + 30,
                    y: row * 60 + 50,
                    radius: 20,
                    isBomb: isBomb,
                    color: isBomb ? '#000000' : colors[Math.floor(Math.random() * colors.length)]
                });
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        bubbles.forEach(bubble => {
            ctx.beginPath();
            ctx.arc(bubble.x, bubble.y, bubble.radius, 0, Math.PI * 2);
            ctx.fillStyle = bubble.isBomb ? '#ff0000' : bubble.color; // Bombs red dikhenge
            ctx.fill();
            
            if (bubble.isBomb) {
                ctx.fillStyle = 'white';
                ctx.font = 'bold 10px Arial';
                ctx.fillText("BOMB", bubble.x - 15, bubble.y + 4);
            }
            ctx.closePath();
        });
    }

    initGame();
    draw();
</script>
</body>
</html>
