<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Blaster Pro</title>
    <style>
        body { margin: 0; background: #0b0e14; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-wrapper { width: 500px; background: #1a1f2e; padding: 20px; border-radius: 20px; border: 3px solid #38bdf8; text-align: center; }
        .hud { display: flex; justify-content: space-between; font-size: 20px; font-weight: bold; color: #38bdf8; margin-bottom: 15px; }
        canvas { background: #050505; display: block; margin: 0 auto; cursor: crosshair; border-radius: 10px; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="hud">
        <span>SCORE: <span id="score">0</span></span>
        <span>LEVEL: 1</span>
    </div>
    <canvas id="gameCanvas" width="450" height="600"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let score = 0;
    const colors = ['#FF5733', '#33FF57', '#3357FF', '#FF33A1', '#F3FF33'];
    let grid = []; // 2D array for bubbles

    // Initialize Grid (Rows x Cols)
    for(let r=0; r<10; r++) {
        grid[r] = [];
        for(let c=0; c<8; c++) {
            grid[r][c] = { color: colors[Math.floor(Math.random()*colors.length)], active: true };
        }
    }

    function draw() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        for(let r=0; r<10; r++) {
            for(let c=0; c<8; c++) {
                if(grid[r][c].active) {
                    ctx.fillStyle = grid[r][c].color;
                    ctx.beginPath();
                    ctx.arc(c*55 + 30, r*55 + 30, 20, 0, Math.PI*2);
                    ctx.fill();
                }
            }
        }
    }

    // Click logic to Burst
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / 55);
        const y = Math.floor((e.clientY - rect.top) / 55);
        
        if(y < 10 && x < 8 && grid[y][x].active) {
            grid[y][x].active = false; // Burst
            score += 10;
            document.getElementById('score').innerText = score;
            
            // New ball falling effect logic
            setTimeout(() => {
                grid[y][x] = { color: colors[Math.floor(Math.random()*colors.length)], active: true };
                draw();
            }, 300);
        }
        draw();
    });

    draw();
</script>
</body>
</html>
