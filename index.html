<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Target Timer Puzzle</title>
    <style>
        body { background: #0b1e3a; color: white; text-align: center; font-family: sans-serif; margin: 0; }
        canvas { background: #000; border: 4px solid #00d4ff; margin-top: 20px; cursor: crosshair; }
    </style>
</head>
<body>
    <h2>Level: <span id="level">1</span> | Timer: <span id="timer">10</span>s</h2>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <p>Score: <span id="score">0</span></p>

    <script>
        let score = 0, timeLeft = 10;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function drawBall() {
            ctx.clearRect(0, 0, 400, 400);
            ctx.fillStyle = "#ff4d4d";
            ctx.beginPath();
            ctx.arc(Math.random() * 300 + 50, Math.random() * 300 + 50, 20, 0, Math.PI * 2);
            ctx.fill();
        }

        canvas.onclick = () => {
            score += 10;
            timeLeft = 10;
            document.getElementById('score').innerText = score;
            drawBall();
        };

        setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) {
                alert("Game Over! Final Score: " + score);
                score = 0; timeLeft = 10;
                document.getElementById('score').innerText = score;
            }
        }, 1000);

        drawBall();
    </script>
</body>
</html>
