<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Target Timer Puzzle</title>
    <style>
        body { 
            background: #090d16; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 20px; 
        }
        .game-wrapper { 
            background: #111827; 
            padding: 30px; 
            border-radius: 20px; 
            border: 2px solid #38bdf8; 
            text-align: center; 
            width: 700px;
        }
        .stats { 
            display: flex; 
            justify-content: space-between; 
            font-size: 18px; 
            margin-bottom: 20px; 
            color: #38bdf8; 
            font-weight: bold; 
        }
        canvas { 
            background: #030712; 
            border: 2px solid #0284c7; 
            border-radius: 10px; 
            cursor: pointer; 
            display: block;
            margin: 0 auto;
        }
        .btn-start {
            margin-top: 20px;
            padding: 12px 30px;
            background: #0284c7;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <h1>TARGET TIMER PUZZLE</h1>
    <div class="stats">
        <span>SCORE: <span id="score">0</span></span>
        <span>LEVEL: 1/50</span>
        <span>STAGE: 1/10</span>
        <span>TOTAL TIME: <span id="timer">119</span>s</span>
    </div>
    
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    
    <div style="margin-top: 20px;">Get 50 points to unlock Stage 2!</div>
    <button class="btn-start" onclick="location.reload()">START NEW GAME</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const colors = ['#3b82f6', '#f43f5e', '#10b981'];
    let balls = [];
    let score = 0;

    // Grid initialize karna
    function initGrid() {
        for(let r=0; r<8; r++) {
            for(let c=0; c<12; c++) {
                balls.push({
                    x: 30 + c*50, y: 30 + r*45,
                    color: colors[Math.floor(Math.random()*3)],
                    timer: Math.floor(Math.random()*10) + 5
                });
            }
        }
    }

    // Canvas draw karna
    function draw() {
        ctx.clearRect(0, 0, 600, 400);
        balls.forEach(b => {
            ctx.fillStyle = b.color;
            ctx.beginPath(); 
            ctx.arc(b.x, b.y, 18, 0, Math.PI*2); 
            ctx.fill();
            
            // Timer text
            ctx.fillStyle = "white";
            ctx.font = "12px Arial";
            ctx.textAlign = "center";
            ctx.fillText(b.timer, b.x, b.y + 5);
        });
    }

    // Click logic
    canvas.addEventListener('click', (e) => {
        score += 10;
        document.getElementById('score').innerText = score;
    });

    // Timer logic
    setInterval(() => {
        balls.forEach(b => {
            if(b.timer > 0) b.timer--;
        });
        draw();
    }, 1000);

    initGrid();
    draw();
</script>
</body>
</html>
