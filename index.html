<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Target Arcade</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #090d16; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; font-family: sans-serif; }
        .game-container { background: #111827; border: 3px solid #38bdf8; border-radius: 20px; padding: 25px; width: 600px; text-align: center; box-shadow: 0 0 40px rgba(56, 189, 248, 0.2); position: relative; }
        canvas { background: #030712; border: 2px solid #0284c7; border-radius: 10px; cursor: crosshair; display: block; margin: 15px auto; }
        .hud { display: flex; justify-content: space-between; font-weight: bold; background: #1f2937; padding: 10px; border-radius: 10px; }
        .overlay { position: absolute; top:0; left:0; width: 100%; height: 100%; background: rgba(3, 7, 18, 0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; border-radius: 20px; }
        .hidden { display: none !important; }
        .btn-arcade { background: #38bdf8; border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; color: white; transition: 0.3s; }
        .quiz-option { width: 80%; margin: 8px 0; background: #374151; padding: 12px; border: 1px solid #60a5fa; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="game-container">
    <h3>ARCADE TARGET BLASTER</h3>
    <div class="hud">
        <div>SCORE: <span id="score">0</span></div>
        <div>LEVEL: <span id="level">1</span></div>
        <div>TIME: <span id="time">120</span>s</div>
    </div>
    <canvas id="gameCanvas" width="540" height="400"></canvas>
    <button id="start-btn" class="btn-arcade" onclick="startGame()">START MISSION</button>

    <div id="quiz-overlay" class="overlay hidden">
        <h4 class="text-warning">LEVEL QUIZ CHALLENGE</h4>
        <p id="question">Loading question...</p>
        <div id="options" class="w-100 d-flex flex-column align-items-center"></div>
    </div>
</div>

<script>
    let score = 0, level = 1, timeLeft = 120;
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Drawing Grid Logic
    function draw() {
        ctx.clearRect(0,0,540,400);
        for(let r=0; r<8; r++) {
            for(let c=0; c<11; c++) {
                ctx.fillStyle = (r+c)%2 === 0 ? '#3b82f6' : '#f43f5e';
                ctx.beginPath(); ctx.arc(45+c*48, 45+r*45, 18, 0, Math.PI*2); ctx.fill();
            }
        }
        requestAnimationFrame(draw);
    }

    // Interaction
    canvas.onclick = () => {
        score += 20;
        document.getElementById('score').innerText = score;
        if(score >= 100) triggerQuiz();
    };

    function triggerQuiz() {
        document.getElementById('quiz-overlay').classList.remove('hidden');
        document.getElementById('question').innerText = "Which planet is the largest?";
        const opts = document.getElementById('options');
        opts.innerHTML = '';
        ['Mars', 'Jupiter', 'Saturn'].forEach(opt => {
            let btn = document.createElement('div');
            btn.className = 'quiz-option';
            btn.innerText = opt;
            btn.onclick = () => {
                level++;
                document.getElementById('level').innerText = level;
                score = 0;
                document.getElementById('quiz-overlay').classList.add('hidden');
            };
            opts.appendChild(btn);
        });
    }

    function startGame() {
        document.getElementById('start-btn').style.display = 'none';
        setInterval(() => {
            timeLeft--;
            document.getElementById('time').innerText = timeLeft;
        }, 1000);
        draw();
    }
</script>
</body>
</html>
