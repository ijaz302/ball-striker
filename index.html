<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Timer Puzzle</title>
    <style>
        /* CrazyGames Guideline: Mobile-friendly and Responsive */
        body { margin: 0; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        .game-wrapper { width: 95%; max-width: 600px; text-align: center; }
        canvas { border: 4px solid #38bdf8; border-radius: 12px; background: #020617; touch-action: none; width: 100%; }
        .ui-panel { background: #1e293b; padding: 20px; border-radius: 15px; display: none; }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div id="game-ui">
        <h3>TARGET TIMER</h3>
        <p>Score: <span id="score">0</span> | Time: <span id="time">10</span>s</p>
        <canvas id="gameCanvas" width="600" height="400"></canvas>
    </div>
    
    <div id="ui-panel" class="ui-panel">
        <h2 id="q-text">Sawal yahan aayega?</h2>
        <button onclick="handleAnswer(true)">TRUE</button>
        <button onclick="handleAnswer(false)">FALSE</button>
    </div>
</div>

<script>
    // CrazyGames Guideline: Use Web Audio API for performance
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.value = freq;
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let score = 0, gameActive = true;

    // Drawing Logic (High-quality aesthetic)
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#f43f5e";
        ctx.beginPath();
        ctx.arc(300, 200, 40, 0, Math.PI*2);
        ctx.fill();
        if(gameActive) requestAnimationFrame(draw);
    }

    canvas.addEventListener('mousedown', () => {
        if(gameActive) {
            playSound(440); // Click feedback
            score += 10;
            document.getElementById('score').innerText = score;
        }
    });

    // Game Timer (Clean UI update)
    let timeLeft = 10;
    const timer = setInterval(() => {
        timeLeft--;
        document.getElementById('time').innerText = timeLeft;
        if(timeLeft <= 0) {
            clearInterval(timer);
            gameActive = false;
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('ui-panel').style.display = 'block';
        }
    }, 1000);

    function handleAnswer(ans) {
        playSound(880); // Success feedback
        alert("Finished! Score: " + score);
        location.reload();
    }

    draw();
</script>
</body>
</html>
