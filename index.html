<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Cascade Arcade</title>
    <style>
        body { margin: 0; background: #0b0e14; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        #game-wrapper { width: 500px; background: #1a1f2e; border: 4px solid #38bdf8; border-radius: 20px; padding: 20px; text-align: center; }
        canvas { background: #050505; border-radius: 10px; cursor: crosshair; }
        .hud { display: flex; justify-content: space-between; font-size: 20px; color: #38bdf8; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="hud">
        <span>SCORE: <span id="score">0</span></span>
        <span>LEVEL: <span id="level">1</span></span>
    </div>
    <canvas id="gameCanvas" width="450" height="550"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let score = 0, level = 1;
    const colors = ['#FF5733', '#33FF57', '#3357FF', '#FF33A1', '#F3FF33'];
    let bubbles = [];

    // Bubble Class (Falling Physics)
    class Bubble {
        constructor(x, y, color, type = 'normal') {
            this.x = x; this.y = y; this.r = 22;
            this.color = color; this.type = type;
            this.vy = 2; // Falling speed
        }
        update() { this.y += this.vy; }
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill();
            if(this.type === 'bomb') { ctx.fillStyle = 'white'; ctx.fillText('B', this.x-3, this.y+3); }
        }
    }

    function spawnBubble() {
        let x = Math.random() * (canvas.width - 40) + 20;
        let color = colors[Math.floor(Math.random() * colors.length)];
        let type = Math.random() > 0.9 ? 'bomb' : 'normal';
        bubbles.push(new Bubble(x, -50, color, type));
    }

    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        
        bubbles.forEach((b, i) => {
            if (Math.hypot(b.x - mx, b.y - my) < b.r) {
                if(b.type === 'bomb') {
                    bubbles = []; // Bomb blast clears all
                    score += 50;
                } else {
                    bubbles.splice(i, 1);
                    score += 10;
                }
                document.getElementById('score').innerText = score;
            }
        });
    });

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(Math.random() < 0.02) spawnBubble();
        
        bubbles.forEach((b, i) => {
            b.update();
            b.draw();
            if(b.y > canvas.height) bubbles.splice(i, 1);
        });
        requestAnimationFrame(animate);
    }

    animate();
</script>
</body>
</html>
